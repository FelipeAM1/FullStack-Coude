<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Skin</title>

    <link rel="stylesheet" href="LayoutStyle.css">
</head>

<body>

<header class="navbar">

    <div class="logo">
        <a href="#">
            <img src="Imagens/LogoD4.png" alt="logodiablo">
        </a>
    </div>

    <nav class="menu">
        <a href="#">Início</a>
        <a href="#">Destaques</a>
        <a href="#">Skins</a>
    </nav>

</header>


<section id="banner">
    <a href="#">
        <img src="Imagens/BannerD4.jpg" alt="Banner Diablo">
    </a>
</section>


<section class="skins">

    <div class="card">
        <img src="Imagens/Skin Paladino 1.avif" alt="Skin de Paladino">
        <h3>Paladino</h3>
        <p>Empunhe o poder celestial a favor do Anjo Inarius</p>
        <button>Ver mais</button>
    </div>

    <div class="card">
        <img src="Imagens/Skin Rogue 1.jpg" alt="Skin de Renegado">
        <h3>Renegado</h3>
        <p>A lâmina surge antes do medo</p>
        <button>Ver mais</button>
    </div>

    <div class="card">
        <img src="Imagens/Skin Necromante 1.webp" alt="Skin de Necromante">
        <h3>Necromante</h3>
        <p>Eu comando o que vocês temem</p>
        <button>Ver mais</button>
    </div>

    <div class="card">
        <img src="Imagens/Skin barbaro 1.jpg" alt="Skin de Barbaro">
        <h3>Barbaro</h3>
        <p>Ninguem deveria viver no medo</p>
        <button>Ver mais</button>
    </div>

    <div class="card">
        <img src="Imagens/Skin mago 1.jpg" alt="Skin de Mago">
        <h3>Mago</h3>
        <p>Poder arcano em forma</p>
        <button>Ver mais</button>
    </div>

</section>

<section class="grid-final">

<div class="box grande"></div>

<div class="coluna">
    <div class="box pequeno"></div>
    <div class="box pequeno"></div>
    <div class="box pequeno"></div>
    <div class="box pequeno"></div>
</div>

<div class="box grande"></div>

</section>

</body>
</html>
